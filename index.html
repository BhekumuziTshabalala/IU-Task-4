<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <title>Document</title>
</head>
<body>

    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Contacts</a>
        </div>
    </nav>

    <table class="table">
        <thead>
            <tr>
            <th scope="col">#</th>
            <th scope="col">Name</th>
            <th scope="col">Phone Number</th>
            <th scope="col">Email</th>
            </tr>
        </thead>
        <tbody id="contactTableBody">
        </tbody>
        
    </table>

    <hr>

    <h2>Add contacts</h2>

    <form id="contactForm" class="m-3">
        <div class="mb-3">
            <label for="nameInput" class="form-label">Name</label>
            <input type="text" class="form-control" id="nameInput" required>
        </div>
        <div class="mb-3">
            <label for="phoneInput" class="form-label">Phone Number</label>
            <input type="text" class="form-control" id="phoneInput" required>
        </div>
        <div class="mb-3">
            <label for="emailInput" class="form-label">Email</label>
            <input type="email" class="form-control" id="emailInput" required>
        </div>
        <button type="submit" class="btn btn-primary">Add Contact</button>
  </form>

  <div class="card mt-4">
    <div class="card-body">
        <h5 class="card-title text-danger">Remove Contact</h5>
        <form id="removeContactForm">
            <div class="mb-3">
                <label for="removeNameInput" class="form-label">Contact Name</label>
                <input type="text" class="form-control" id="removeNameInput" placeholder="Enter exact name to remove" required>
            </div>
            <button type="submit" class="btn btn-danger">Remove Contact</button>
        </form>
    </div>
</div>

    
<footer>
    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmxc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</footer>

</body>
</html>
