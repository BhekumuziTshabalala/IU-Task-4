<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacts Directory</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            color: #2D3748;
        }

        .navbar {
            background-color: rgba(255, 255, 255, 0.8) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.03);
        }

        .navbar-brand {
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #4A5568 !important;
        }

        .card {
            border: none;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.25);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px 0 rgba(31, 38, 135, 0.08);
        }

        .card-header-custom {
            font-weight: 600;
            font-size: 1.1rem;
            color: #2D3748;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            background: transparent;
            padding: 1.25rem 1.5rem;
        }

        .table-responsive {
            border-radius: 12px;
            overflow: hidden;
            background: #ffffff;
            border: 1px solid #edf2f7;
        }

        .table thead th {
            background-color: #f7fafc;
            color: #718096;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
            padding: 1rem 1.25rem;
            border-bottom: 1px solid #edf2f7;
        }

        .table tbody td,
        .table tbody th {
            padding: 1rem 1.25rem;
            vertical-align: middle;
            color: #4A5568;
            border-bottom: 1px solid #edf2f7;
        }

        .btn {
            border-radius: 10px;
            font-weight: 500;
            padding: 0.6rem 1.2rem;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4F46E5 0%, #3B82F6 100%);
            border: none;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #4338CA 0%, #2563EB 100%);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .btn-danger {
            background: linear-gradient(135deg, #EF4444 0%, #DC2626 100%);
            border: none;
        }

        .btn-danger:hover {
            background: linear-gradient(135deg, #DC2626 0%, #B91C1C 100%);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
        }

        .form-control {
            border-radius: 10px;
            border: 1px solid #E2E8F0;
            padding: 0.6rem 1rem;
            background-color: #FFFFFF;
            transition: all 0.2s ease;
        }

        .form-control:focus {
            border-color: #3B82F6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .form-label {
            font-weight: 500;
            color: #4A5568;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }
    </style>
</head>

<body>

    <!-- Top Navigation Bar -->
    <nav class="navbar navbar-expand-lg sticky-top mb-4">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <i class="bi bi-person-lines-fill me-2 fs-4 text-primary"></i>
                <span>Contacts Directory</span>
            </a>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="container pb-5">
        <div class="row g-4">

            <!-- Sidebar: Add and Remove Actions -->
            <div class="col-lg-4">

                <div class="card mb-4">
                    <div class="card-header-custom d-flex align-items-center">
                        <i class="bi bi-person-plus me-2 text-primary"></i>
                        <span>Add New Contact</span>
                    </div>
                    <div class="card-body p-4">
                        <form id="contactForm">
                            <div class="mb-3">
                                <label for="nameInput" class="form-label">Full Name</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0 text-muted"><i
                                            class="bi bi-person"></i></span>
                                    <input type="text" class="form-control border-start-0" id="nameInput"
                                        placeholder="John Doe" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="phoneInput" class="form-label">Phone Number</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0 text-muted"><i
                                            class="bi bi-telephone"></i></span>
                                    <input type="text" class="form-control border-start-0" id="phoneInput"
                                        placeholder="082 111 2222" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="emailInput" class="form-label">Email Address</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0 text-muted"><i
                                            class="bi bi-envelope"></i></span>
                                    <input type="email" class="form-control border-start-0" id="emailInput"
                                        placeholder="johndoe@sample.com" required>
                                </div>
                            </div>

                            <button type="submit"
                                class="btn btn-primary w-100 d-flex align-items-center justify-content-center">
                                <i class="bi bi-plus-lg me-2"></i> Add Contact
                            </button>
                        </form>
                    </div>
                </div>

                <!-- Remove Contact Form Card -->
                <div class="card">
                    <div class="card-header-custom d-flex align-items-center">
                        <i class="bi bi-person-dash me-2 text-danger"></i>
                        <span>Remove Contact</span>
                    </div>
                    <div class="card-body p-4">
                        <form id="removeContactForm">
                            <div class="mb-3">
                                <label for="removeNameInput" class="form-label">Contact Name</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0 text-muted"><i
                                            class="bi bi-search"></i></span>
                                    <input type="text" class="form-control border-start-0" id="removeNameInput"
                                        placeholder="Enter exact name to remove" required>
                                </div>
                                <div class="form-text text-muted mt-2">
                                    Type the exact name of the contact you wish to delete from the list.
                                </div>
                            </div>
                            <button type="submit"
                                class="btn btn-danger w-100 d-flex align-items-center justify-content-center">
                                <i class="bi bi-trash me-2"></i> Remove Contact
                            </button>
                        </form>
                    </div>
                </div>

            </div>

            <!-- Main Directory Table -->
            <div class="col-lg-8">
                <div class="card h-100">
                    <div class="card-header-custom d-flex align-items-center justify-content-between">
                        <div class="d-flex align-items-center">
                            <i class="bi bi-list-task me-2 text-primary"></i>
                            <span>All Saved Contacts</span>
                        </div>
                    </div>
                    <div class="card-body p-4">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead>
                                    <tr>
                                        <th scope="col" style="width: 50px;">#</th>
                                        <th scope="col">Name</th>
                                        <th scope="col">Phone Number</th>
                                        <th scope="col">Email</th>
                                        <th scope="col" style="width: 100px;">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="contactTableBody">
                                    <!-- Dynamic rows loaded here -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Scripts -->
    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmxc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>

</html>
